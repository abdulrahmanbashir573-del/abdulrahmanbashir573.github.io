<!DOCTYPE html>
<html>
<head>
  <title>Bashir Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#141e30,#243b55);
      font-family:Arial, sans-serif;
    }

    .container{
      text-align:center;
    }

    h1{
      color:white;
      margin-bottom:30px;
    }

    .search-box{
      display:flex;
      background:white;
      border-radius:30px;
      overflow:hidden;
      box-shadow:0 4px 20px rgba(0,0,0,0.3);
    }

    input{
      border:none;
      padding:15px;
      width:250px;
      outline:none;
      font-size:16px;
    }

    button{
      border:none;
      padding:15px 25px;
      background:#00c6ff;
      color:white;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#0095cc;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Bashir Browser 🔥</h1>
    <div class="search-box">
      <input type="text" id="searchBox" placeholder="Search anything...">
      <button onclick="search()">Search</button>
    </div>
  </div>

  <script>
    function search(){
      var q = document.getElementById("searchBox").value;
      if(q.trim() !== ""){
        window.open("https://www.google.com/search?q=" + q, "_blank");
      }
    }

    document.getElementById("searchBox")
    .addEventListener("keypress", function(event){
      if(event.key === "Enter"){
        search();
      }
    });
  </script>
</body>
</html>
