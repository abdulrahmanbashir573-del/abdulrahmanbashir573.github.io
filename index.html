<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Search X AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
height:100vh;
background: linear-gradient(270deg,#141e30,#243b55);
background-size:600% 600%;
animation:bg 12s infinite;
color:white;
overflow:hidden;
transition:.3s;
}

@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

/* top */
.top{
display:flex;
justify-content:space-between;
padding:15px;
}

.icon{cursor:pointer;padding:10px}

/* profile */
.profile{
width:45px;height:45px;border-radius:50%;border:2px solid white;
}

/* center */
.center{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:90%;max-width:550px;
}

.search{
display:flex;padding:10px;
}

.search input{
flex:1;padding:15px;border:none;background:transparent;color:white;font-size:16px;
}

.search button{
background:#00c6ff;border:none;padding:12px 20px;border-radius:10px;
}

/* suggestions */
.suggestions div{
padding:10px;cursor:pointer;
}
.suggestions div:hover{
background:rgba(255,255,255,0.2);
}

/* settings */
.settings{
position:fixed;right:-320px;top:0;width:300px;height:100%;
padding:20px;transition:.4s;
}
.settings.active{right:0;}

.btn{
width:100%;margin:8px 0;padding:10px;border:none;border-radius:10px;cursor:pointer;
}

/* chat */
.chat{
position:fixed;
bottom:20px;
right:20px;
width:300px;
height:400px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.chat-header{
padding:10px;
text-align:center;
}

.chat-messages{
flex:1;
padding:10px;
overflow:auto;
font-size:14px;
}

.chat-input{
display:flex;
}

.chat-input input{
flex:1;
padding:10px;
border:none;
}

.chat-input button{
padding:10px;
border:none;
background:#00c6ff;
}

/* footer */
.footer{
position:fixed;bottom:10px;width:100%;text-align:center;font-size:13px;opacity:.7;
}
</style>

</head>

<body>

<div class="top">
<div class="icon glass" onclick="toggleSettings()">⚙</div>
<img src="https://i.pravatar.cc/100" class="profile">
</div>

<div class="center">
<div class="search glass">
<input id="input" placeholder="ابحث...">
<button onclick="search()">🔍</button>
</div>
<div id="sug" class="glass suggestions"></div>
</div>

<!-- settings -->
<div class="settings glass" id="settings">
<h3>⚙ Settings</h3>

<button class="btn" onclick="setBg()">🌄 Custom BG</button>
<button class="btn" onclick="bg1()">🏔 Nature</button>
<button class="btn" onclick="bg2()">🌌 Space</button>
<button class="btn" onclick="bg3()">🌆 City</button>

<button class="btn" onclick="toggleLang()">🌐 Language</button>
<button class="btn" onclick="toggleMode()">🌙 Mode</button>
</div>

<!-- AI CHAT -->
<div class="chat glass">
<div class="chat-header">🤖 AI</div>
<div class="chat-messages" id="chat"></div>
<div class="chat-input">
<input id="chatInput">
<button onclick="send()">➤</button>
</div>
</div>

<div class="footer">
Designed by Abdelrahman Bashir
</div>

<script>
let input=document.getElementById("input")
let sug=document.getElementById("sug")

function search(){
let q=input.value
if(q) window.open("https://www.google.com/search?q="+q)
}

/* suggestions */
let words=["facebook","youtube","chatgpt","ai","games","coding"]

input.oninput=()=>{
sug.innerHTML=""
let v=input.value.toLowerCase()
words.forEach(w=>{
if(w.includes(v)&&v!=""){
let d=document.createElement("div")
d.innerText=w
d.onclick=()=>{input.value=w;search()}
sug.appendChild(d)
}
})
}

/* settings */
function toggleSettings(){
document.getElementById("settings").classList.toggle("active")
}

/* backgrounds */
function setBg(){
let url=prompt("Image URL")
if(url){
document.body.style.background=`url(${url}) center/cover`
localStorage.setItem("bg",url)
}
}
function bg1(){set("https://picsum.photos/1920/1080?nature")}
function bg2(){set("https://picsum.photos/1920/1080?space")}
function bg3(){set("https://picsum.photos/1920/1080?city")}

function set(u){
document.body.style.background=`url(${u}) center/cover`
localStorage.setItem("bg",u)
}

if(localStorage.getItem("bg")){
document.body.style.background=`url(${localStorage.getItem("bg")}) center/cover`
}

/* language */
let ar=true
function toggleLang(){
if(ar){input.placeholder="Search..."}
else{input.placeholder="ابحث..."}
ar=!ar
}

/* mode */
function toggleMode(){
document.body.style.background="#111"
}

/* AI (simple demo) */
function send(){
let msg=document.getElementById("chatInput").value
let chat=document.getElementById("chat")

chat.innerHTML+=`<div>👤 ${msg}</div>`

let reply="أنا مساعد ذكي 😎"
if(msg.includes("hello")) reply="Hi 👋"
if(msg.includes("ai")) reply="AI is the future 🔥"
if(msg.includes("اسمك")) reply="أنا AI Assistant"

chat.innerHTML+=`<div>🤖 ${reply}</div>`

document.getElementById("chatInput").value=""
chat.scrollTop=chat.scrollHeight
}
</script>

</body>
</html>
